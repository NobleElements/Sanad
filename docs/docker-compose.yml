version: '3.8'

services:
  caddy:
    image: ghcr.io/nobleelements/sanad-caddy:latest
    container_name: sanad-caddy
    restart: unless-stopped
    environment:
      - DOMAIN=:5858
    ports:
      - "5858:5858"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - sanad-api

  sanad-api:
    image: ghcr.io/nobleelements/sanad:latest
    container_name: sanad-api
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    volumes:
      - ./sanad-data:/app/Data

volumes:
  caddy_data:
  caddy_config:
